<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caramel Foods & Beverages - Contact Us</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="nav-menu">
        <div class="logo"> Caramel Foods & Beverages</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </div>

    <section class="about-banner">
        <h2>Contact Us</h2>
        <p>We'd love to hear from you</p>
    </section>
  <div class="form">
            <h3>Register with Us</h3>
            <form method="POST" action="#">
                <label for="fname">Full Name:</label>
                <input type="text" id="fname" name="name" placeholder="Enter your full name" required autofocus>

               <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="bdate" required>
                <label for="em">Email Address:</label>
                <input type="email" id="em" name="email"  required>

                <label for="pw">Password:</label>
                <input type="password" id="pw" name="password" required>

                <label>Gender:</label>
                <div class="radio">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                </div>

                <label>Favourite Platforms:</label>
                <div class="checkbox">
                    <input type="checkbox" id="tw" name="twitter" value="Twitter">
                    <label for="tw">Twitter</label>
                    <input type="checkbox" id="fb" name="facebook" value="Facebook">
                    <label for="fb">Facebook</label>
                    <input type="checkbox" id="wa" name="whatsapp" value="Whatsapp">
                    <label for="wa">Whatsapp</label>
                </div>

                <label for="description">Tell us about yourself:</label>
                <textarea id="description" name="description" rows="4" placeholder="Write a short description about yourself..."></textarea>

                <label for="country">Select your Country:</label>
                <select id="country" name="country">
                    <option value="">Choose a country</option>
                    <option value="Uganda">Uganda</option>
                    <option value="Kenya">Kenya</option>
                    <option value="Tanzania">Tanzania</option>
                    <option value="Rwanda">Rwanda</option>
                    <option value="Burundi">Burundi</option>
                </select>

                <button type="submit" class="button">Register</button>

            </form>
        </div>
    <footer class="footer">
        <p>&copy; 2025 Caramel Foods & Beverages. All Rights Reserved</p>
        <p>Kampala, Uganda Tel: +256 752567450</p>
    </footer>

</body>
</html>
